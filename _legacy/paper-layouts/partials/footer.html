<footer class="mx-auto flex h-[4.5rem] max-w-(--w) items-center px-8 text-xs tracking-wider uppercase opacity-60">
  <div class="mr-auto">
    {{- if site.Copyright -}} {{- site.Copyright -}} {{- else -}} &copy; {{-
    now.Year }}
    <a class="link" href="{{- `` | absURL -}}">{{- site.Title -}}</a>
    {{- end -}}
    {{- with site.Params.siteStart -}}
    <div id="site-uptime" class="mt-1 normal-case" data-start="{{ . }}">
      This blog is live and counting.
    </div>
    <script>
      (() => {
        const el = document.getElementById('site-uptime');
        if (!el) return;

        const start = new Date(el.dataset.start);
        if (Number.isNaN(start.getTime())) return;

        const format = () => {
          const now = new Date();
          const diffMs = Math.max(0, now - start);
          const totalMins = Math.floor(diffMs / 60000);
          const days = Math.floor(totalMins / 1440);

          el.textContent = `This blog is alive for ${days} days and counting.`;
        };

        format();
        setInterval(format, 60000);
      })();
    </script>
    {{- end -}}
  </div>
  <a class="link mx-6" href="https://gohugo.io/" rel="noopener" target="_blank">powered by hugo️️</a>️
  <a class="link" href="https://github.com/nanxiaobei/hugo-paper" rel="noopener" target="_blank">hugo-paper</a>
</footer>
