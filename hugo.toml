baseURL = 'https://blog.rbtreefence.xyz/'
languageCode = 'zh-cn'
DefaultContentLanguage = 'zh-cn'
title = 'RBTree On the Fence'
enableInlineShortcodes = true

[menu]
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 10

[taxonomies]
category = "categories"
tag = "tags"


[module]
[[module.imports]]
path = "github.com/nanxiaobei/hugo-paper"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# [services]
#   [services.disqus]
#     shortname = 'YOUR_DISQUS_SHORTNAME'     # use disqus comments

[params]
# color style
color = 'linen' # linen, wheat, gray, light
author = 'RBTree'

# header social icons
github = 'jiyangzh'                            # github.com/YOUR_GITHUB_ID
mastodon = 'https://mastodon.social/@rbtree27'
rss = true                                     # show rss icon

# home page profile
avatar = 'https://files.mastodon.social/accounts/avatars/115/707/959/569/272/437/original/a8b470bb203793c9.png'                 # gravatar email or image url
name = 'RBTree'
bio = 'RBTree是红黑树，因为每次看到红黑树我就头疼，遗忘速度仅次于KMP，所以不如拿最头疼的概念当在线身份好了。'


