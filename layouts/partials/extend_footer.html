{{- with site.Params.siteStart -}}
<div id="site-uptime" class="footer" style="margin-top:0;padding-top:0;" data-start="{{ . }}">
  This blog is alive for ... days and counting.
</div>
<script>
  (() => {
    const el = document.getElementById('site-uptime');
    if (!el) return;
    const start = new Date(el.dataset.start);
    if (Number.isNaN(start.getTime())) return;
    const format = () => {
      const diffMs = Math.max(0, new Date() - start);
      const days = Math.floor(diffMs / 86400000);
      el.textContent = `This blog is alive for ${days} days and counting.`;
    };
    format();
    setInterval(format, 60000);
  })();
</script>
{{- end -}}
