{{- if and site.Params.twikoo.envId (not (eq .Params.comments false)) -}}
<hr class="mt-8 mb-8 opacity-20">
<div id="tcomment"></div>
<script src="https://cdn.jsdelivr.net/npm/twikoo@1.6.44/dist/twikoo.min.js" defer></script>
<script>
  window.addEventListener('DOMContentLoaded', function () {
    if (!window.twikoo) return;
    window.twikoo.init({
      envId: '{{- site.Params.twikoo.envId -}}',
      el: '#tcomment',
      path: window.location.pathname,
      placeholder: '随便说点？',
    });
  });
</script>
{{- end -}}
